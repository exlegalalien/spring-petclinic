# This enables the "Run workflow" button in the GitHub UI
on:
  workflow_dispatch:

jobs:
  greet-on-demand:
    runs-on: ubuntu-latest
    steps:
      # Step 1: You must check out the code to access local actions
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Reference your custom action
      # This assumes your action.yml is in the root or a specific folder
      - name: Execute Welcome Action
        uses: CybersecGard/welcome-action@af9062dad994b719700256cfcfc86390533c139a
        with:
          who-to-greet: ${{ github.actor }}
