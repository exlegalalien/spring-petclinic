# This enables the "Run workflow" button in the GitHub UI
on:
  workflow_dispatch:
    inputs:
      name_input:
        description: 'Who should the action greet?'
        required: true
        default: 'GitHub User'

jobs:
  greet-on-demand:
    runs-on: ubuntu-latest
    steps:
      # Step 1: You must check out the code to access local actions
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Reference your custom action
      # This assumes your action.yml is in the root or a specific folder
      - name: Execute Welcome Action
        uses: CybersecGard/welcome-action@eadbac49c46992c8ca0ec649616c3af41b929028
        with:
          who-to-greet: ${{ github.actor }}
